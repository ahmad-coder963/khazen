<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول | مركز التحميلات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="portal.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <img src="assets/img/LogoAlkhazensoft2.png" alt="Al-Khazen Logo" />
          <div class="brand-text">
            <strong>تسجيل الدخول</strong>
            <span>مركز الخازن للبرمجيات</span>
          </div>
        </div>

        <button class="nav-toggle" type="button">القائمة</button>

        <nav class="nav">
          <a href="downloads.html">التحميلات</a>
          <a href="downloads.html#khazen">نسخ الخازن</a>
          <a href="downloads.html">نسخ الخازن موبايل</a>
          <a href="downloads.html#mobile">تطبيقات الموبايل</a>
          <a href="downloads.html#external">البرامج الخارجية</a>
          <a class="active" href="login.html">تسجيل الدخول</a>
        </nav>

        <div class="topbar-actions">
          <a class="btn ghost" href="downloads.html">العودة للتحميلات</a>
        </div>
      </div>
    </header>

    <main class="login-wrap">
      <div class="login-card">
        <span class="badge">تسجيل الدخول</span>
        <h2>تسجيل الدخول</h2>
        <form class="login-form">
          <div class="field">
            <label for="email">البريد الإلكتروني</label>
            <input id="email" type="email" placeholder="name@company.com" required />
          </div>
          <div class="field">
            <label for="password">كلمة السر</label>
            <input id="password" type="password" placeholder="••••••••" required />
          </div>
          <div class="login-actions">
            <label>
              <input type="checkbox" /> تذكر معلومات الدخول
            </label>
            <button class="btn primary" type="submit">تسجيل الدخول</button>
          </div>
        </form>
        <div class="login-links">
          <span>نسيت كلمة السر؟</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container footer-grid">
        <div>
          <strong>مركز الخازن للبرمجيات</strong>
        </div>
      </div>
    </footer>
  </div>
  <script src="portal.js"></script>
</body>
</html>
